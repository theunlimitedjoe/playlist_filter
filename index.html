<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Roboto, sans-serif; background: transparent; margin: 0; padding: 20px; }
    .tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
    button { padding: 8px 14px; border-radius: 20px; border: 1px solid #333; background: white; cursor: pointer; }
    button.active { background: #690f72; color: white; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 24px; }
    .playlist { display: none; text-align: center; color: #222; text-decoration: none; font-weight: bold; }
    .playlist img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 8px; }
    .playlist.show { display: block; }
    #empty { font-style: italic; }
  </style>
</head>
<body>

<div class="tags">
  <h3>Genre</h3>
  <button data-tag="Rock">Rock</button>
  <button data-tag="Electronic">Electronic</button>
  <button data-tag="Jazz">Jazz</button>
  <button data-tag="Ambient">Ambient</button>
  <button data-tag="Singer-Songwriter">Singer-Songwriter</button>

  <h3>Mood</h3>
  <button data-tag="Melancholy">Melancholy</button>
  <button data-tag="Energetic">Energetic</button>
  <button data-tag="Dark">Dark</button>
  <button data-tag="Positive">Positive</button>
  <button data-tag="Heavy">Heavy</button>
    
  <h3>Vocals</h3>
  <button data-tag="All Vocals">All Vocals</button>
  <button data-tag="Some Instrumentals">Some Instrumentals</button>
  <button data-tag="All Instrumentals">All Instrumentals</button>
  
</div>

<p id="empty">Pick a tag to see playlists.</p>

<div class="grid" id="playlistGrid"></div>

<script>
  const playlists = [
    {
      title: "Do Your Thing",
      url: "https://tidal.com/playlist/95aea74c-f381-4430-938c-bf38f5ab92ac",
      image: "images/do-your-thing.jpg",
      tags: ["Rock", "Positive", "All Vocals"]
    },
    {
      title: "Cuties",
      url: "https://tidal.com/playlist/f4aabb68-7538-4dde-9046-d2e195e437ee",
      image: "https://resources.tidal.com/images/02c75470/eaec/43d8/876e/3ab4153a7faf/1080x1080.jpg",
      tags: ["Positive", "All Vocals"]
    }
  ];

  const buttons = document.querySelectorAll("button[data-tag]");
  const grid = document.getElementById("playlistGrid");
  const empty = document.getElementById("empty");
  let selectedTags = [];

  function renderPlaylists() {
    grid.innerHTML = playlists.map(playlist => `
      <a class="playlist"
         href="${playlist.url}"
         target="_blank"
         data-tags="${playlist.tags.join(",")}">
        <img src="${playlist.image}" alt="${playlist.title}">
        <div>${playlist.title}</div>
      </a>
    `).join("");
  }

  renderPlaylists();

  buttons.forEach(button => {
    button.addEventListener("click", () => {
      const tag = button.dataset.tag;

      if (selectedTags.includes(tag)) {
        selectedTags = selectedTags.filter(t => t !== tag);
        button.classList.remove("active");
      } else {
        selectedTags.push(tag);
        button.classList.add("active");
      }

      updatePlaylists();
    });
  });

  function updatePlaylists() {
    const playlistCards = document.querySelectorAll(".playlist");
    let visibleCount = 0;

    playlistCards.forEach(card => {
      const tags = card.dataset.tags.split(",").map(tag => tag.trim());

      const matches = selectedTags.length > 0 &&
        selectedTags.every(tag => tags.includes(tag));

      card.classList.toggle("show", matches);
      if (matches) visibleCount++;
    });

    empty.textContent = selectedTags.length === 0
      ? "Pick a tag to see playlists."
      : visibleCount === 0
        ? "No playlists match those tags."
        : "";
  }
</script>

</body>
</html>
