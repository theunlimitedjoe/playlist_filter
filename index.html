<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Roboto, sans-serif;
      background: transparent;
      margin: 0;
      padding: 20px;
    }

    .tag-section {
      margin-bottom: 18px;
    }

    .tag-section h3 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #333;
      background: white;
      cursor: pointer;
      font-size: 16px;
      line-height: 1.2;
    }

    button.active {
      background: #690f72;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 24px;
      margin-top: 20px;
    }

    .playlist {
      display: none;
      text-align: center;
      color: #222;
      text-decoration: none;
      font-weight: bold;
    }

    .playlist img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 8px;
    }

    .playlist.show {
      display: block;
    }

    #empty {
      font-style: italic;
      margin-top: 18px;
    }
  </style>
</head>
<body>

  <div class="tag-section">
    <h3>Genre</h3>
    <div class="tags">
      <button data-tag="Rock">Rock</button>
      <button data-tag="Electronic">Electronic</button>
      <button data-tag="Jazz">Jazz</button>
      <button data-tag="Ambient">Ambient</button>
      <button data-tag="Singer-Songwriter">Singer-Songwriter</button>
    </div>
  </div>

  <div class="tag-section">
    <h3>Mood</h3>
    <div class="tags">
      <button data-tag="Cinematic">Cinematic</button>
      <button data-tag="Dark">Dark</button>
      <button data-tag="Dreamy">Dreamy</button>
      <button data-tag="Energetic">Energetic</button>
      <button data-tag="Heavy">Heavy</button>
      <button data-tag="Melancholy">Melancholy</button>
      <button data-tag="Positive">Positive</button>
      <button data-tag="Romantic">Romantic</button>
      <button data-tag="Surreal">Surreal</button>
    </div>
  </div>

  <div class="tag-section">
    <h3>Vocals</h3>
    <div class="tags">
      <button data-tag="All Vocals">All Vocals</button>
      <button data-tag="Some Vocals">Some Vocals</button>
      <button data-tag="No Vocals">No Vocals</button>
    </div>
  </div>

  <p id="empty">Choose tag(s) to see playlists.</p>

  <div class="grid" id="playlistGrid"></div>

  <script>
    const playlists = [

        image: "https://resources.tidal.com/images/c338b596/324c/4015/a687/768f3e473f49/320x320.jpg",
        tags: ["Rock", "Electronic", "Cinematic", "Some Vocals"]
      },
      {

        url: "https://tidal.com/playlist/e4de32d7-6542-4aee-915e-7bfb183195ca",
        image: "https://resources.tidal.com/images/914f8fc9/ba37/4402/9e9d/1833a4c4296a/320x320.jpg",
        tags: ["Ambient", "Dreamy", "Positive", "No Vocals"]
      },
      {
        title: "Can't Hide It",
        url: "https://tidal.com/playlist/5f8162eb-c9e1-4a7e-b6f8-08b09e5ef2f9",
        image: "https://resources.tidal.com/images/7fec3432/9160/4476/9cc7/a90157866bf4/320x320.jpg",
        tags: ["Rock", "Romantic", "All Vocals"]
      },
      {
        title: "Cuties",
        url: "https://tidal.com/playlist/f4aabb68-7538-4dde-9046-d2e195e437ee",
        image: "https://resources.tidal.com/images/02c75470/eaec/43d8/876e/3ab4153a7faf/320x320.jpg",

      },
      {

        image: "https://resources.tidal.com/images/2b10225e/7a25/43a8/afae/f996dd8042ed/320x320.jpg",
        tags: ["Rock", "Positive", "Some Vocals"]
      },
      {
        title: "Dystopian City",
        url: "https://tidal.com/playlist/82935fcc-78c3-4e6e-8c88-1565fb776cb0",
        image: "https://resources.tidal.com/images/f946d70a/f625/4067/9336/7393944d4168/320x320.jpg",
        tags: ["Dark", "Jazz", "Electronic", "No Vocals"]
      },
      {
        title: "End Time Prophecy",
        url: "https://tidal.com/playlist/a8eb8a41-583d-4002-857b-f8239e7fedf7",
        image: "https://resources.tidal.com/images/9e5f2231/9160/44e1/81dc/14e6f29de9d7/320x320.jpg",
        tags: ["Cinematic", "Dark", "Ambient", "No Vocals"]
      },
      {
        title: "Energizer Bunny Retreat",
        url: "https://tidal.com/playlist/b6bce2bc-7fa2-4f6a-ba1b-d406005488ab",
        image: "https://resources.tidal.com/images/851cf07b/ae1e/4708/8bd2/24d57583514f/320x320.jpg",
        tags: ["Electronic", "No Vocals"]
      },
      {
        title: "Fight the Lonely",
        url: "https://tidal.com/playlist/325456f1-e636-4dcf-89b1-a0f77b1de2ea",
        image: "https://resources.tidal.com/images/d59bed29/d890/469f/95e7/d66be7ac8416/320x320.jpg",
        tags: ["Rock", "Melancholy", "All Vocals"]
      },
      {

        url: "https://tidal.com/playlist/68789925-1b0b-4258-9405-a3c42eb890ca",

      },
      {
        title: "My First Clone",
        url: "https://tidal.com/playlist/4048687f-6420-40a4-b425-fb8ab5f2dd50",
        image: "https://resources.tidal.com/images/c90401f5/0c91/4e53/99ef/1eb031ef50f7/320x320.jpg",
        tags: ["Ambient", "Electronic", "Dreamy", "Surreal", "No Vocals"]
      },
      {
        title: "Nursery Sountrack",
        url: "https://tidal.com/playlist/18cc8b3b-1216-4b58-a5ca-efdf84d64023",
        image: "https://resources.tidal.com/images/43581102/5d6d/41d4/8d62/ae07509d856f/320x320.jpg",
        tags: ["Ambient", "Dreamy", "Positive", "No Vocals"]
      },
      {
        title: "Planet Survey",
        url: "https://tidal.com/playlist/f5b5bc89-bd2c-4178-9bd8-048bb0ce8327",
        image: "https://resources.tidal.com/images/bc21130b/0d8e/469d/a328/e787d24b93a0/320x320.jpg",
        tags: ["Ambient", "Surreal", "Some Vocals"]
      },
      {
        title: "Reincarnation",
        url: "https://tidal.com/playlist/673d9a5f-3c5d-430d-b580-d7e1e4598db4",
        image: "https://resources.tidal.com/images/3239cca3/fcee/4b14/9ed3/4dbd89918b30/320x320.jpg",
        tags: ["Ambient", "Dreamy", "No Vocals"]
      },
      {
        title: "Still In Love",
        url: "https://tidal.com/playlist/a8a1d5a2-1b36-4eb1-ba27-929f0d6a1ede",
        image: "https://resources.tidal.com/images/6d9f70d4/bd89/49e5/a9ea/dadf93dddf47/320x320.jpg",
        tags: ["Romantic", "Rock", "All Vocals"]
      },
      {
        title: "Twighlight Playground",
        url: "https://tidal.com/playlist/26a2db57-97ff-4021-8fed-b29b539eb71a",
        image: "https://resources.tidal.com/images/d36dded0/ef82/4ad0/b231/5cd43610e5bb/320x320.jpg",
        tags: ["Electronic", "Ambient", "Surreal", "Some Vocals"]
      }
    ];

    const buttons = document.querySelectorAll("button[data-tag]");
    const grid = document.getElementById("playlistGrid");
    const empty = document.getElementById("empty");
    let selectedTags = [];

    function renderPlaylists() {
      grid.innerHTML = playlists.map(playlist => `
        <a class="playlist"
           href="${playlist.url}"
           target="_blank"
           data-tags="${playlist.tags.join(",")}">
          <img src="${playlist.image}" alt="${playlist.title}">
          <div>${playlist.title}</div>
        </a>
      `).join("");
    }

    renderPlaylists();

    buttons.forEach(button => {
      button.addEventListener("click", () => {
        const tag = button.dataset.tag;

        if (selectedTags.includes(tag)) {
          selectedTags = selectedTags.filter(t => t !== tag);
          button.classList.remove("active");
        } else {
          selectedTags.push(tag);
          button.classList.add("active");
        }

        updatePlaylists();
      });
    });

    function updatePlaylists() {
      const playlistCards = document.querySelectorAll(".playlist");
      let visibleCount = 0;

      playlistCards.forEach(card => {
        const tags = card.dataset.tags.split(",").map(tag => tag.trim());

        const matches = selectedTags.length > 0 &&
          selectedTags.every(tag => tags.includes(tag));

        card.classList.toggle("show", matches);
        if (matches) visibleCount++;
      });

      empty.textContent = selectedTags.length === 0
        ? "Pick a tag to see playlists."
        : visibleCount === 0
          ? "No playlists match those tags."
          : "";
    }
  </script>

</body>
</html>
