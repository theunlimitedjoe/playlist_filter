<!DOCTYPE html>

<head>
  <title>Playlists</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * {
      box-sizing: border-box;
    }

    .tag-section {
      margin-bottom: 18px;
      max-width: 100%;
    }

    .tag-section h3 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 100%;
    }

    button {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #333;
      background: white;
      cursor: pointer;
      font-size: 16px;
      line-height: 1.2;
      max-width: 100%;
      white-space: normal;
    }

    button.active {
      background: #181818;
      color: white;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-top: 20px;
      width: 100%;
      max-width: 100%;
    }

    .playlist {
      display: none;
      width: clamp(100px, 30vw, 170px);
      text-align: center;
      color: #222;
      text-decoration: none;
      font-weight: bold;
      font-size: clamp(12px, 2.4vw, 16px);
      overflow-wrap: break-word;
    }

    .playlist.show {
      display: block;
    }

    .playlist img {
      width: 100%;
      aspect-ratio: 1 / 1;
      height: auto;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      margin-bottom: 6px;
    }

    #empty {
      font-style: italic;
      margin-top: 18px;
    }
  </style>
</head>

      <button data-tag="Positive">Positive</button>
      <button data-tag="Romantic">Romantic</button>
      <button data-tag="Surreal">Surreal</button>
    </div>
  </div>

  <div class="tag-section">
    <h3>Vocals</h3>

      <button data-tag="All Vocals">All Vocals</button>
      <button data-tag="Some Vocals">Some Vocals</button>
      <button data-tag="No Vocals">No Vocals</button>
    </div>
  </div>

  <p id="empty">Choose tag(s) to see playlists.</p>

  <div class="grid" id="playlistGrid"></div>

  const buttons = document.querySelectorAll("button[data-tag]");
  const grid = document.getElementById("playlistGrid");
  const empty = document.getElementById("empty");
  let selectedTags = [];

  function renderPlaylists() {
    grid.innerHTML = playlists.map(playlist => `
      <a class="playlist"
         href="${playlist.url}"
         target="_blank"
         data-tags="${playlist.tags.join(",")}">
        <img src="${playlist.image}" alt="${playlist.title}">
        <div>${playlist.title}</div>
      </a>
    `).join("");
  }

  renderPlaylists();

  buttons.forEach(button => {
    button.addEventListener("click", () => {
      const tag = button.dataset.tag;

      if (selectedTags.includes(tag)) {
        selectedTags = selectedTags.filter(t => t !== tag);
        button.classList.remove("active");
      } else {
        selectedTags.push(tag);
        button.classList.add("active");
      }

      updatePlaylists();
    });
  });

  function updatePlaylists() {
    const playlistCards = document.querySelectorAll(".playlist");
    let visibleCount = 0;

    playlistCards.forEach(card => {
      const tags = card.dataset.tags.split(",").map(tag => tag.trim());

      const matches = selectedTags.length > 0 &&
        selectedTags.every(tag => tags.includes(tag));

      card.classList.toggle("show", matches);
      if (matches) visibleCount++;
    });

    empty.textContent = selectedTags.length === 0
      ? "Choose tag(s) to see playlists."
      : visibleCount === 0
        ? "No playlists match those tags."
        : "";
  }
