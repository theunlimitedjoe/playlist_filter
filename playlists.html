<!DOCTYPE html>
<html>
<head>
  <title>Playlists</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * {
      box-sizing: border-box;
    }

    .tag-section {
      margin-bottom: 18px;
      max-width: 100%;
    }

    .tag-section h3 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 100%;
    }

    button {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #333;
      background: white;
      cursor: pointer;
      font-size: 16px;
      line-height: 1.2;
      max-width: 100%;
      white-space: normal;
    }

    button.active {
      background: #181818;
      color: white;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-top: 20px;
      width: 100%;
      max-width: 100%;
      justify-content: center;
    }
    .playlist {
      display: none;
      width: clamp(125px, 35vw, 170px);
      text-align: center;
      color: #222;
      text-decoration: none;
      font-weight: bold;
      font-size: clamp(12px, 2.4vw, 16px);
      overflow-wrap: break-word;
    }

    .playlist.show {
      display: block;
    }

    .playlist img {
      width: 100%;
      aspect-ratio: 1 / 1;
      height: auto;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      margin-bottom: 6px;
    }

    .mobile-filters {
      display: none;
    }

    @media (max-width: 700px) {
      .tag-section {
        display: none;
      }

      .mobile-filters {
        display: block;
        margin-bottom: 18px;
      }

      .mobile-filters label {
        display: block;
        font-weight: bold;
        margin: 12px 0 5px;
      }

      .mobile-filters select {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border-radius: 8px;
        border: 1px solid #777;
        background: white;
      }
    }

    #empty {
      font-style: italic;
      margin-top: 18px;
    }
  </style>
</head>

  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  const buttons = document.querySelectorAll("button[data-tag]");
  const grid = document.getElementById("playlistGrid");
  const empty = document.getElementById("empty");
  let selectedTags = [];

  const mobileSelects = document.querySelectorAll(".mobile-filters select");

  mobileSelects.forEach(select => {
    select.addEventListener("change", () => {
      selectedTags = Array.from(mobileSelects)
        .map(select => select.value)
        .filter(value => value !== "");

      buttons.forEach(button => {
        button.classList.toggle("active", selectedTags.includes(button.dataset.tag));
      });

      updatePlaylists();
    });
  });

  function renderPlaylists() {
    grid.innerHTML = playlists.map(playlist => `
      <a class="playlist"
         href="${playlist.url}"
         target="_blank"
         data-tags="${playlist.tags.join(",")}">
        <img src="${playlist.image}" alt="${playlist.title}">
        <div>${playlist.title}</div>
      </a>
    `).join("");
  }
  
 shuffleArray(playlists);
 renderPlaylists();
 updatePlaylists();

  buttons.forEach(button => {
    button.addEventListener("click", () => {
      const tag = button.dataset.tag;

      if (selectedTags.includes(tag)) {
        selectedTags = selectedTags.filter(t => t !== tag);
        button.classList.remove("active");
      } else {
        selectedTags.push(tag);
        button.classList.add("active");
      }

      updatePlaylists();
    });
  });

  function updatePlaylists() {
    const playlistCards = document.querySelectorAll(".playlist");
    let visibleCount = 0;

    playlistCards.forEach(card => {
      const tags = card.dataset.tags.split(",").map(tag => tag.trim());

      const matches =
        selectedTags.length === 0 ||
        selectedTags.every(tag => tags.includes(tag));

      card.classList.toggle("show", matches);
      if (matches) visibleCount++;
    });

      empty.textContent =
        visibleCount === 0
          ? "No playlists match those tags."
          : "";
  }
