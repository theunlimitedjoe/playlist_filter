<!DOCTYPE html>
<html>
<head>
  <title>Music</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    .album-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 320px));
      gap: 32px;
      justify-content: center;
      margin: 40px auto;
    }

    .album-card {
      display: block;
      text-decoration: none;
      color: inherit;

      padding: 14px;
      border: 1px solid #dddddd;
      border-radius: 14px;

      background: rgba(255,255,255,0.35);

      box-shadow: 0 1px 4px rgba(0,0,0,.04);

      transition: transform .15s ease;
    }

    .album-card:hover {
      transform: translateY(-2px);
    }

    .album-card img {
      width: 100%;
      display: block;
      border-radius: 8px;
    }

    .album-year {
      text-align: center;
      margin-top: 14px;
      font-size: 1.1rem;
    }

    .discover-music {
      margin: 60px auto;
      max-width: 1200px;
      text-align: center;
    }

    .discover-music iframe {
      width: 100%;
      height: 1400px;
      border: none;
      border-radius: 8px;
      background: white;
    }

    @media (max-width: 700px) {
      .album-grid {
        grid-template-columns: 1fr;
        max-width: 340px;
      }
    }
</style>
</head>

<body>

<header>
  <nav>
    <a href="music.html" class="active">Music</a>
    <a href="playlists.html">Playlists</a>
    <a href="video.html">Video</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>


  
<main>
<div class="album-grid">

  <a class="album-card" href="https://tidal.com/album/441584887">
    <img src="https://resources.tidal.com/images/350d5b27/e555/447f/b66f/10c67140af4f/320x320.jpg">
    <div class="album-year">Room Guy - Alive <i>(2025)</i></div>
  </a>

  <a class="album-card" href="https://tidal.com/album/362156205">
    <img src="https://resources.tidal.com/images/5d650eb3/5da7/4538/8ae9/9b78490f8557/320x320.jpg">
    <div class="album-year">Room Guy - Corolla <i>(2024)</i></div>
  </a>

  <a class="album-card" href="https://tidal.com/album/246035547">
    <img src="https://resources.tidal.com/images/ebd0f70c/6109/4cd2/bba1/384d64092fe1/320x320.jpg">
    <div class="album-year">Microbatch - Evening Overlook <i>(2022)</i></div>
  </a>

  <a class="album-card" href="https://softpedestal.bandcamp.com/album/big-friend">
    <img src="https://f4.bcbits.com/img/a297492095_1x1_700.avif">
    <div class="album-year">Big Friend - Self Titled <i>(2020)</i></div>
  </a>
</div>


<section class="discover-music">
  <h2>Discover New Music</h2>

  <iframe
    src="https://theunlimitedjoe.github.io/new_music_finder/"
    title="Discover New Music"
    loading="lazy">
  </iframe>
</section>

  
</main>

</body>
</html>
